# =============================================
# STUDYPILOT AI - APPLICATION CONFIGURATION
# AI-Powered Learning, Assessment & Study Management Platform
# =============================================

# Server
server.port=8080

# =============================================
# DATABASE - MySQL
# Change username/password to match your MySQL
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/studypilot_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# FILE UPLOAD
# =============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Folder where uploaded files are saved on disk
app.upload.dir=uploads

# =============================================
# JWT CONFIGURATION
# IMPORTANT: Change the secret in production!
# =============================================
app.jwt.secret=StudyPilotAISuperSecretKeyForJWTTokenGeneration2024PleaseChangeThisInProduction
app.jwt.expiration=86400000

# =============================================
# SPRING AI - OLLAMA
# Ollama must be running: ollama serve
# Model must be pulled: ollama pull llama3.2
# =============================================
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=llama3.2:latest
spring.ai.ollama.chat.options.temperature=0.7
spring.ai.ollama.chat.options.num-predict=2048

# =============================================
# SWAGGER / OPENAPI
# Visit: http://localhost:8080/swagger-ui.html
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# =============================================
# LOGGING
# =============================================
logging.level.com.studypilot=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.ai=INFO
logging.level.org.hibernate.SQL=WARN

# =============================================
# CORS - Allow React frontend (port 3000)
# =============================================
app.cors.allowed-origins=http://localhost:3000